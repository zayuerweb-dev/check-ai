name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check deploy environment
        run: |
          node --version
          npm --version
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::Missing GitHub secret CLOUDFLARE_API_TOKEN"
            exit 1
          fi
          npx --yes wrangler@4 --version
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy to Cloudflare Pages
        run: npx --yes wrangler@4 pages deploy . --project-name check-ai --branch main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: a8a75b3f2632512b9336ddf2d2096b28

      - name: Ping IndexNow (Bing/Yandex) after deploy
        # Runs on every main deploy (incl. the daily data sync once its PR merges),
        # so search engines re-crawl the fresh sitemap. Best-effort; never fail the deploy.
        run: |
          sleep 30
          node scripts/indexnow-ping.mjs || echo "IndexNow ping failed (non-fatal)"
