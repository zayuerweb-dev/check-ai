name: Sync models.dev

on:
  schedule:
    # Daily at 06:00 UTC (14:00 Beijing). Adjust if you want.
    - cron: '0 6 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: sync-models-dev
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need full history so the push isn't rejected as non-fast-forward.
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run sync script
        id: sync
        run: node scripts/sync-models-dev.mjs

      - name: Show diff
        run: |
          git status --short
          git diff --stat -- data/ || true

      - name: Commit and push to main
        if: steps.sync.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "chore(data): sync models.dev (${{ steps.sync.outputs.providers }} providers, ${{ steps.sync.outputs.models }} models)"
          # Try main first; if branch protection blocks it, fall back to a bot branch.
          if git push origin HEAD:main; then
            echo "Pushed to main."
          else
            echo "Direct push to main blocked. Falling back to bot/sync-models-dev branch."
            git push -f origin HEAD:bot/sync-models-dev
            echo "Open a PR manually at: https://github.com/${{ github.repository }}/compare/main...bot/sync-models-dev"
            exit 1
          fi

      - name: No changes
        if: steps.sync.outputs.changed != 'true'
        run: echo "No changes from upstream — skipping commit."
