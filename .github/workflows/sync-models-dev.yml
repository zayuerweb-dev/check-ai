name: Sync models.dev

on:
  schedule:
    # Daily at 06:00 UTC (14:00 Beijing).
    - cron: '0 6 * * *'
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'scripts/sync-models-dev.mjs'
      - 'scripts/build-model-pages.mjs'
      - 'scripts/build-sitemap.mjs'
      - '.github/workflows/sync-models-dev.yml'

permissions:
  contents: write

concurrency:
  group: sync-models-dev
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync data from models.dev
        id: sync
        run: node scripts/sync-models-dev.mjs

      - name: Rebuild model detail pages (if data changed)
        if: steps.sync.outputs.changed == 'true'
        run: node scripts/build-model-pages.mjs

      - name: Rebuild sitemap (if data changed)
        if: steps.sync.outputs.changed == 'true'
        run: node scripts/build-sitemap.mjs

      - name: Show diff
        if: steps.sync.outputs.changed == 'true'
        run: |
          git status --short | head -30
          echo "..."
          git status --short | wc -l

      - name: Open auto-merging PR with synced data
        # main is protected (PR + e2e required), so GITHUB_TOKEN can't push to it
        # directly and the PRs it opens don't trigger workflows. We use a PAT
        # (secrets.SYNC_PAT) so the PR triggers the e2e check and can auto-merge.
        # On merge, the push to main fires cloudflare-pages.yml, which deploys and
        # pings IndexNow.
        if: steps.sync.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.SYNC_PAT }}
          REPO: ${{ github.repository }}
        run: |
          BRANCH="bot/sync-models-dev"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add data/ models/ sitemap.xml
          git commit -m "chore(data): sync models.dev (${{ steps.sync.outputs.providers }} providers, ${{ steps.sync.outputs.models }} models) + rebuild pages"
          # Push as the PAT user so the PR (and its e2e check) actually triggers.
          git push -f "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" "HEAD:$BRANCH"
          # Reuse the open PR if there is one; the force-push above updated its head.
          if ! gh pr view "$BRANCH" --json state --jq '.state' 2>/dev/null | grep -q OPEN; then
            gh pr create --base main --head "$BRANCH" \
              --title "chore(data): daily models.dev sync (${{ steps.sync.outputs.providers }} providers, ${{ steps.sync.outputs.models }} models)" \
              --body "Automated daily models.dev sync. Auto-merges once the e2e check passes; merge then triggers the Cloudflare Pages deploy + IndexNow ping."
          fi
          gh pr merge "$BRANCH" --squash --auto

      - name: No changes
        if: steps.sync.outputs.changed != 'true'
        run: echo "No changes from upstream — skipping rebuild."
